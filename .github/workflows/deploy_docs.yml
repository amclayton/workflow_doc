name: Build and Deploy Sphinx Docs

on:
  push:
    branches:
      - main  # Change to "master" if your default branch uses the old naming
  workflow_dispatch: # Allows you to trigger the build manually from the GitHub UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Automatically caches pip dependencies to speed up future runs

      # 3. Install Sphinx and extensions
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Build the HTML pages using sphinx-build
      - name: Build Sphinx Documentation
        run: |
          # Usage: sphinx-build -b <builder> <source_dir> <output_dir>
          sphinx-build -b html source build/html
          
          # Optional: Fixes GitHub Pages hiding folders starting with underscores (like _static)
          touch build/html/.nojekyll

      # 5. Deploy the compiled HTML to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/html
          publish_branch: gh-pages
